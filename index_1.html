<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PP Episode Studio — Live Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#DA532C;
    --charcoal:#1F1F1F;
    --paper:#F5F3EF;
    --card:#ffffff;
    --line:#e7e2da;
    --wait:#8a8580;
    --work:#2f6fb0;
    --you:#DA532C;
    --done:#2e9e5b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Barlow',system-ui,sans-serif;
    background:var(--paper);
    color:var(--charcoal);
    min-height:100vh;
    padding:0 0 60px;
  }
  header{
    background:var(--charcoal);
    color:#fff;
    padding:22px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    border-bottom:5px solid var(--orange);
  }
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand h1{
    font-family:'Anton',sans-serif;
    font-size:30px;
    letter-spacing:.5px;
    text-transform:uppercase;
  }
  .brand h1 .accent{color:var(--orange)}
  .brand .sub{font-size:14px;color:#b9b4ad;font-weight:500}
  .status-line{display:flex;align-items:center;gap:16px;font-size:13px;color:#cfcac2}
  .live{display:flex;align-items:center;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--done);box-shadow:0 0 0 0 rgba(46,158,91,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,158,91,.5)}70%{box-shadow:0 0 0 8px rgba(46,158,91,0)}100%{box-shadow:0 0 0 0 rgba(46,158,91,0)}}
  button.refresh{
    font-family:'Barlow';font-weight:600;font-size:13px;
    background:var(--orange);color:#fff;border:none;border-radius:8px;
    padding:9px 16px;cursor:pointer;
  }
  button.refresh:hover{filter:brightness(1.08)}
  .wrap{max-width:1080px;margin:0 auto;padding:26px 28px}
  .count{font-size:14px;color:#6b665f;margin-bottom:16px;font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);
    display:flex;flex-direction:column;gap:12px;
  }
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .card h2{font-family:'Anton',sans-serif;font-size:21px;line-height:1.1;text-transform:uppercase;letter-spacing:.3px}
  .badge{
    font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
    padding:5px 10px;border-radius:20px;white-space:nowrap;color:#fff;flex-shrink:0;
  }
  .badge.wait{background:var(--wait)}
  .badge.work{background:var(--work)}
  .badge.you{background:var(--you);animation:pulse-o 1.8s infinite}
  .badge.done{background:var(--done)}
  @keyframes pulse-o{0%{box-shadow:0 0 0 0 rgba(218,83,44,.5)}70%{box-shadow:0 0 0 7px rgba(218,83,44,0)}100%{box-shadow:0 0 0 0 rgba(218,83,44,0)}}
  .meta{font-size:13px;color:#6b665f;line-height:1.5}
  .meta .lbl{color:#a29d95;font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.4px}
  .heygen{font-size:12.5px;color:#8a8580;font-style:italic}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .links a{
    font-size:12px;font-weight:600;text-decoration:none;color:var(--orange);
    border:1px solid var(--orange);border-radius:7px;padding:5px 10px;
  }
  .links a:hover{background:var(--orange);color:#fff}
  .src a{color:var(--work);font-size:12.5px;text-decoration:none;word-break:break-all}
  .src a:hover{text-decoration:underline}
  .empty,.error{background:#fff;border:1px dashed var(--line);border-radius:14px;padding:40px;text-align:center;color:#8a8580}
  .error{border-color:#e0b4a8;color:#b5482c}
  footer{max-width:1080px;margin:30px auto 0;padding:0 28px;font-size:12px;color:#a29d95}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
  .legend span{display:flex;align-items:center;gap:6px}
  .chip{width:11px;height:11px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>PP <span class="accent">Episode</span> Studio</h1>
    <span class="sub">Live episode board</span>
  </div>
  <div class="status-line">
    <span class="live"><span class="dot"></span> Auto-refreshing</span>
    <span id="updated">—</span>
    <button class="refresh" onclick="load()">Refresh now</button>
  </div>
</header>

<div class="wrap">
  <div class="count" id="count">Loading…</div>
  <div class="grid" id="grid"></div>
</div>

<footer>
  Stage 1 · read-only board · action buttons (approvals &amp; start-episode) come next.
  <div class="legend">
    <span><span class="chip" style="background:#8a8580"></span> Waiting</span>
    <span><span class="chip" style="background:#2f6fb0"></span> Engine working</span>
    <span><span class="chip" style="background:#DA532C"></span> Your turn</span>
    <span><span class="chip" style="background:#2e9e5b"></span> Done</span>
  </div>
</footer>

<script>
  const SUPABASE_URL = 'https://ydqzdzpyemrqttiyhpwp.supabase.co';
  const ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkcXpkenB5ZW1ycXR0aXlocHdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3NDI3NjQsImV4cCI6MjEwMDMxODc2NH0.S1fyuA3lSgx_vCZgb5g8JcCvnqXiytUoy1C3WrXPjoY';

  const STATUS = {
    queued:            {label:'Queued',                   cls:'wait'},
    building:          {label:'Building…',                cls:'work'},
    awaiting_render:   {label:'Your turn · HeyGen render',cls:'you'},
    rendering:         {label:'Rendering…',               cls:'work'},
    awaiting_cover:    {label:'Your turn · pick cover',   cls:'you'},
    assembling:        {label:'Assembling video…',        cls:'work'},
    awaiting_approval: {label:'Your turn · approve',       cls:'you'},
    revising:          {label:'Revising…',                cls:'work'},
    ready:             {label:'Ready ✅',                  cls:'done'},
    published:         {label:'Published 🎉',              cls:'done'},
  };

  function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  function fmtDate(s){ if(!s) return ''; const d=new Date(s); return d.toLocaleString('en-AU',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

  function render(rows){
    const grid=document.getElementById('grid');
    const count=document.getElementById('count');
    if(!rows.length){
      count.textContent='';
      grid.innerHTML='<div class="empty">No episodes on the rail yet. Add one and it will appear here. 🐎</div>';
      return;
    }
    count.textContent = rows.length + (rows.length===1?' episode on the rail':' episodes on the rail');
    grid.innerHTML = rows.map(ep=>{
      const st = STATUS[ep.status] || {label:ep.status||'—',cls:'wait'};
      const links=[];
      if(ep.video_url)     links.push(`<a href="${esc(ep.video_url)}" target="_blank">▶ Video</a>`);
      if(ep.ebook_url)     links.push(`<a href="${esc(ep.ebook_url)}" target="_blank">📘 E-book</a>`);
      if(ep.thumbnail_url) links.push(`<a href="${esc(ep.thumbnail_url)}" target="_blank">🖼 Thumbnail</a>`);
      return `<div class="card">
        <div class="top">
          <h2>${esc(ep.title)||'Untitled'}</h2>
          <span class="badge ${st.cls}">${esc(st.label)}</span>
        </div>
        ${ep.heygen_name?`<div class="heygen">${esc(ep.heygen_name)}</div>`:''}
        <div class="meta"><span class="lbl">Created</span><br>${esc(fmtDate(ep.created_at))}</div>
        ${ep.source_url?`<div class="src"><span class="lbl">Source</span><br><a href="${esc(ep.source_url)}" target="_blank">${esc(ep.source_url)}</a></div>`:''}
        ${links.length?`<div class="links">${links.join('')}</div>`:''}
      </div>`;
    }).join('');
  }

  async function load(){
    const count=document.getElementById('count');
    try{
      const res=await fetch(`${SUPABASE_URL}/rest/v1/episodes?select=*&order=created_at.desc`,{
        headers:{apikey:ANON, Authorization:'Bearer '+ANON}
      });
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data=await res.json();
      render(data);
      document.getElementById('updated').textContent='Updated '+new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }catch(e){
      count.textContent='';
      document.getElementById('grid').innerHTML='<div class="error">Couldn\'t reach the database.<br><small>'+esc(e.message)+'</small></div>';
    }
  }

  load();
  setInterval(load, 8000);
</script>
</body>
</html>
