<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PP Episode Studio</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="dot"></span> Practical Punting · Episode Studio</div>
  <div class="who" id="whobar" hidden>
    <span id="who"></span>
    <button id="logout" class="ghost">Log out</button>
  </div>
</header>

<!-- LOGIN -->
<main id="login" class="login" hidden>
  <form id="login-form" class="card login-card">
    <h1>Sign in</h1>
    <p class="muted">Enter your email and we'll send you a one-tap login link.</p>
    <input id="email" type="email" placeholder="you@example.com" required autocomplete="email">
    <button type="submit" class="primary">Send login link</button>
    <p id="login-msg" class="muted" role="status" aria-live="polite"></p>
  </form>
</main>

<!-- BOARD -->
<main id="board" class="board" hidden>
  <div class="board-head">
    <h1>Episodes</h1>
    <span class="live"><span class="pulse"></span> live</span>
  </div>
  <div id="cards" class="cards"><p class="muted">Loading…</p></div>
</main>

<!-- supabase-js v2 (UMD) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
